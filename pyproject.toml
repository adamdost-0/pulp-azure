[tool.coverage.run]
branch = true
source = ["harness/local/pulp_harness"]

[tool.coverage.report]
fail_under = 100
precision = 2
show_missing = true
skip_covered = false

[tool.mypy]
python_version = "3.11"
strict = true
mypy_path = "harness/local"
files = [
  "harness/local/pulp_harness",
  "harness/local/scripts/generate-deb-fixture.py",
  "tests",
]
warn_unreachable = true

[tool.pytest.ini_options]
addopts = "--strict-config --strict-markers"
pythonpath = ["harness/local"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
  "B",
  "C4",
  "E",
  "F",
  "I",
  "N",
  "PERF",
  "PIE",
  "PLC",
  "PLE",
  "PLR",
  "PLW",
  "PTH",
  "RET",
  "RUF",
  "SIM",
  "UP",
]
ignore = [
  "PLR0913",
]

[tool.ruff.lint.per-file-ignores]
"harness/local/scripts/generate-deb-fixture.py" = ["E402"]
"tests/**/*.py" = ["PLR2004"]

