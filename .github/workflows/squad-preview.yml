name: Squad Preview Validation

on:
  push:
    branches: [preview]

permissions:
  contents: read

jobs:
  quality-gates:
    uses: ./.github/workflows/squad-ci.yml

  preview-evidence:
    name: Preview evidence
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@v4

      - name: Create preview manifest
        run: |
          git rev-parse HEAD > preview-manifest.txt
          git ls-files | sort >> preview-manifest.txt

      - name: Upload preview manifest
        uses: actions/upload-artifact@v4
        with:
          name: preview-manifest
          path: preview-manifest.txt
          if-no-files-found: error
