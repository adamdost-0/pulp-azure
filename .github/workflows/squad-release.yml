name: Squad Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-gates:
    uses: ./.github/workflows/squad-ci.yml

  release-evidence:
    name: Release evidence
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create immutable source manifest
        run: |
          {
            printf 'commit=%s\n' "$(git rev-parse HEAD)"
            printf 'tracked_files_sha256=\n'
            git ls-files -z | xargs -0 sha256sum
          } > release-manifest.txt

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.txt
          if-no-files-found: error
