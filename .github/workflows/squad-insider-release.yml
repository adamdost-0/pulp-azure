name: Squad Insider Release

on:
  push:
    branches: [insider]

permissions:
  contents: read

jobs:
  quality-gates:
    uses: ./.github/workflows/squad-ci.yml

  insider-evidence:
    name: Insider release evidence
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create insider source manifest
        run: |
          {
            printf 'commit=%s\n' "$(git rev-parse HEAD)"
            printf 'tracked_files_sha256=\n'
            git ls-files -z | xargs -0 sha256sum
          } > insider-release-manifest.txt

      - name: Upload insider release manifest
        uses: actions/upload-artifact@v4
        with:
          name: insider-release-manifest
          path: insider-release-manifest.txt
          if-no-files-found: error
